<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Everglow Travel</title>

    <!-- 🌟 Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Playfair+Display:wght@500;700&family=Poppins:wght@300;500;700&family=Caveat:wght@400..700&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;

            background: url('assets/images/Home2.jpg') center/cover no-repeat;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* overlay */
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 40, 90, 0.55);
        }

        /* box */
        .box {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 480px;
        }

        .logo {
            width: 180px;
            margin-bottom: 20px;

            display: block;
            margin-left: auto;
            margin-right: auto;

            filter: drop-shadow(0 6px 15px rgba(0, 0, 0, 0.5));

            animation: fadeDown 1.2s ease;
        }

        /* animation นุ่มๆ */
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 🔥 TITLE */
        .title {
            font-family: 'Cinzel', serif;
            font-size: 48px;
            /* 🔥 ใหญ่ขึ้น */
            font-weight: 700;
            letter-spacing: 8px;
            margin: 0;
            line-height: 1.3;
        }

        .white {
            color: white;
            text-shadow: 0 3px 15px rgba(0, 0, 0, 0.5);
        }

        .blue {
            color: #0d6efd;
            margin-left: 12px;
            text-shadow: 0 3px 15px rgba(0, 0, 0, 0.3);
        }

        /* 💎 BRAND */
        .brand {
            font-family: 'Caveat', cursive;
            font-size: 70px;
            font-weight: 600;
            color: white;

            margin-top: 15px;

            letter-spacing: 2px;

            text-shadow:
                0 2px 10px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(255, 255, 255, 0.2);
        }

        /* text */
        p {
            color: white;
            margin-top: 10px;
        }

        /* 🔥 BUTTONS */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn-group>div {
            flex: 1;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .thai {
            background: linear-gradient(45deg, #0d6efd, #3a8bff);
            color: white;
        }

        .eng {
            background: white;
            color: #0d6efd;
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
        }

        small {
            display: block;
            font-size: 12px;
            color: #cfe3ff;
            margin-top: 8px;
        }

        @font-face {
            font-family: 'AlexBrush';
            src: url('textfouns/Windsong.ttf') format('truetype');
        }

        .brand {
            font-family: 'AlexBrush', cursive;
            font-size: 70px;
        }
    </style>
</head>

<body>

    <div class="overlay"></div>

    <div class="box">

        <!-- 🔥 LOGO -->
        <img src="assets/images/White_Logo.png" class="logo top-logo">

        <!-- ✨ TITLE -->
        <h1 class="title">
            <span class="white">WELCOME</span>
            <span class="blue">TO</span>
        </h1>

        <!-- 💎 BRAND -->
        <h2 class="brand">Everglow Travel</h2>

        <p>กรุณาเลือกภาษา / PLEASE SELECT LANGUAGE</p>

        <!-- 🔥 BUTTONS -->
        <div class="btn-group">

            <div>
                <button class="btn thai" onclick="goThai()">TH ไทย</button>
                <small>สำหรับคนไทย</small>
            </div>

            <div>
                <button class="btn eng" onclick="goEng()">ENG English</button>
                <small>For Foreigners</small>
            </div>

        </div>

    </div>

    <script>
        function goThai() {
            window.location.href = "home-th.html";
        }
        function goEng() {
            window.location.href = "home-en.html";
        }
    </script>

</body>

</html>
